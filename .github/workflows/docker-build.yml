name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # 🔹 Backend
    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/smart-fridge-backend ./backend
    - name: Scan Backend Image
      uses: lazy-actions/gitrivy@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        image: ${{ secrets.DOCKER_USERNAME }}/smart-fridge-backend
    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/smart-fridge-backend


    # 🔹 Frontend
    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/smart-fridge-frontend ./frontend
    - name: Scan Frontend Image
      uses: lazy-actions/gitrivy@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        image: ${{ secrets.DOCKER_USERNAME }}/smart-fridge-frontend
    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/smart-fridge-frontend


    # 🔹 Notifier
    - name: Build Notifier Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/smart-fridge-notifier ./notifier
    - name: Scan Notifier Image
      uses: lazy-actions/gitrivy@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        image: ${{ secrets.DOCKER_USERNAME }}/smart-fridge-notifier
    - name: Push Notifier Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/smart-fridge-notifier